- name: Configurar VM com Zabbix Agent (Amazon Linux)
  hosts: zabbix_agent
  become: true
  vars_files:
    - vars.yml

  handlers:
    - name: restart zabbix-agent
      ansible.builtin.service:
        name: zabbix-agent
        state: restarted

  tasks:

    - name: Atualizar sistema
      ansible.builtin.yum:
        name: "*"
        state: latest

    - name: Debug variável
      debug:
         var: zabbix_server_ip

    - name: Instalar dependências
      ansible.builtin.yum:
        name:
          - wget
          - gnupg2
        state: present

    - name: Instalar repositório Zabbix (RPM)
      ansible.builtin.get_url:
        url: https://repo.zabbix.com/zabbix/6.0/rhel/7/x86_64/zabbix-release-6.0-4.el7.noarch.rpm
        dest: /tmp/zabbix-release.rpm

    - name: Instalar repo
      ansible.builtin.yum:
        name: /tmp/zabbix-release.rpm
        state: present

    - name: Instalar Zabbix Agent
      ansible.builtin.yum:
        name: zabbix-agent
        state: present

    - name: Configurar Server
      ansible.builtin.lineinfile:
        path: /etc/zabbix/zabbix_agentd.conf
        regexp: '^Server='
        line: "Server={{ zabbix_server_ip }}"
      notify: restart zabbix-agent

    - name: Configurar ServerActive
      ansible.builtin.lineinfile:
        path: /etc/zabbix/zabbix_agentd.conf
        regexp: '^ServerActive='
        line: "ServerActive={{ zabbix_server_ip }}"
      notify: restart zabbix-agent

    - name: Configurar Hostname
      ansible.builtin.lineinfile:
        path: /etc/zabbix/zabbix_agentd.conf
        regexp: '^Hostname='
        line: "Hostname={{ zabbix_agent_hostname }}"
      notify: restart zabbix-agent

    - name: Iniciar e habilitar Zabbix Agent
      ansible.builtin.service:
        name: zabbix-agent
        state: started
        enabled: true